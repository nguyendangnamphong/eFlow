name: eFlow CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile and Static Analysis
        run: |
          ./mvnw -Pprod compile -DskipTests "-Dmodernizer.skip=true"

      - name: Verify Spring Boot Start (Optional)
        run: |
          ./mvnw spring-boot:help

  test-logic:
    name: Test API Logic
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Integration Tests
        id: run-tests
        continue-on-error: true
        run: |
          ./mvnw verify "-Dmodernizer.skip=true" "-Denforcer.skip=true" -e

      - name: Upload Surefire Test Results (Unit Tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/*.xml

      - name: Upload Failsafe Test Results (Integration Tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/*.xml

      - name: Fail build if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  report:
    name: Test Results Report
    needs: test-logic
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Surefire (Unit Test) Results
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: test-results/surefire
        continue-on-error: true

      - name: Download Failsafe (IT) Results
        uses: actions/download-artifact@v4
        with:
          name: failsafe-reports
          path: test-results/failsafe
        continue-on-error: true

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        with:
          name: API Logic Test Report
          path: 'test-results/**/*.xml'
          reporter: java-junit
